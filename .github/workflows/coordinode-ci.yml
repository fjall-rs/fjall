name: CoordiNode CI

on:
  push:
    branches:
      - main
      - "feat/#*"
      - "fix/#*"
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    # Fast gate — runs on every push and PR
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy (strict)
        run: cargo clippy --all-features -- -D warnings

  test:
    # Full matrix — only on push to main/feature branches (not on PRs)
    if: github.event_name == 'push'
    needs: lint
    timeout-minutes: 20
    strategy:
      matrix:
        rust_version: [stable, "1.90.0"]
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust_version }}
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ runner.os }}-cargo
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --all-features
      - name: Run doc tests
        run: cargo test --doc --features lz4

  test-pr:
    # Lightweight — only on PRs (ubuntu stable)
    if: github.event_name == 'pull_request'
    needs: lint
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - name: Run tests
        run: cargo nextest run --all-features
      - name: Run doc tests
        run: cargo test --doc --features lz4

  codecov:
    if: github.event_name == 'push'
    needs: lint
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: taiki-e/install-action@nextest
      - run: cargo llvm-cov --no-report nextest --all-features
      - run: cargo llvm-cov --no-report --doc --features lz4
      - run: cargo llvm-cov report --doctests --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
